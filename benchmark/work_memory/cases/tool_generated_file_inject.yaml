case_id: tool_generated_file_inject
title: Tool generated file inject
mode: session_inject
capability: tool_grounded_memory
priority: normal
tags:
  - tool
  - files
turns:
  - role: assistant
    tool_name: export_report
    tool_input:
      format: "markdown"
    tool_output:
      generated_file: "benchmark/results/work_memory_phase1/report.md"
checkpoints:
  - id: cp_after_async_commit
    trigger: after_async_commit
    query: "Which file was generated by the tool?"
    expected_any:
      - "benchmark/results/work_memory_phase1/report.md"
    source_expectation: tool_evidence
artifact_assertions:
  key_file_paths_present:
    - "benchmark/results/work_memory_phase1/report.md"
