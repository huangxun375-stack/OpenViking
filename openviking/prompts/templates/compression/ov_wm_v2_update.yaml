metadata:
  id: "compression.ov_wm_v2_update"
  name: "Working Memory v2 - Incremental Update (tool_call)"
  description: "Incrementally update an existing Working Memory by emitting per-section decisions via the `update_working_memory` tool."
  version: "2.2.0"
  language: "en"
  category: "compression"

variables:
  - name: "latest_archive_overview"
    type: "string"
    description: "Current (prior) Working Memory to be updated."
    required: true
  - name: "messages"
    type: "string"
    description: "New conversation content since the last update."
    required: true

template: |
  You are the Working Memory maintainer for a long-running session. Your one and
  only job is to produce a per-section decision via the `update_working_memory`
  tool. The session will keep going for many more rounds, so information you
  drop now is GONE — nobody else will put it back.

  <current_wm>
  {{ latest_archive_overview }}
  </current_wm>

  <new_content>
  {{ messages }}
  </new_content>

  # RULE 0 — Information preservation is the #1 priority.

  The previous Working Memory (<current_wm>) contains durable facts earned by
  the user in earlier rounds — file paths, error details, decisions, constraints,
  dates, platform choices, identifiers. These MUST survive into your new output
  unless the new content explicitly reverses or invalidates them.

  Before you choose an op for a section, mentally list the CONCRETE FACTS it
  currently holds:
    * file paths, module names, function names, line numbers
    * explicit decisions with rationale ("Decision A: ... because ...")
    * error messages / root causes / fixes
    * platform / version / port / directory constraints
    * user goals and hard constraints
    * follow-up items that were not yet resolved

  If an item on that list is still true (not contradicted by <new_content>), it
  MUST appear in your output. Losing a durable fact is a correctness bug.

  # RULE 1 — Op semantics (re-read carefully).

  - **KEEP**  — The existing section already reflects reality. Server preserves
    it byte-for-byte. Emit {"op": "KEEP"}.

  - **UPDATE** — Rewrite the section with full content. CRITICAL: an UPDATE must
    include every still-valid concrete fact from the previous version PLUS the
    new information. UPDATE is "previous + diff", not "only the new stuff".
    Emit {"op": "UPDATE", "content": "<full new body, markdown, NO header line>"}.

  - **APPEND** — Add one or more bullet items to the existing body. Use this for
    sections that grow monotonically (new decisions, new errors, new files).
    Server will render each item as "- <item>" under the existing body.
    Emit {"op": "APPEND", "items": ["item 1", "item 2", ...]}.

  Default preference order when in doubt: KEEP > APPEND > UPDATE.
  Pick UPDATE only when APPEND is wrong (e.g. a short dynamic status line that
  always replaces the previous one).

  # RULE 2 — Per-section op selection.

  - **Session Title** — default KEEP.
    Change ONLY if the overall project direction has *completely* pivoted
    (e.g. "we're abandoning the migration and building X instead").
    Adding a new constraint, fixing an error, or finishing a phase is NOT enough
    to change the title.
    FORBIDDEN Title UPDATE examples:
      * just because Round N added a new Decision
      * just because a sub-phase completed
      * just because a new platform was mentioned

  - **Current State** — default UPDATE. This is the only section that may shrink.
    But the new body MUST still reference any pending item from the previous
    Current State that is not yet resolved.

  - **Task & Goals** — default KEEP. UPDATE only if the user added or changed
    goals. If UPDATE, include ALL earlier goals plus the new ones.

  - **Key Facts & Decisions** — default **APPEND** for new decisions / facts.
    UPDATE is ONLY allowed when an earlier decision was explicitly reversed;
    in that case the UPDATE content MUST list the reversal ("Decision A:
    anyio 4.x → superseded by Decision A'. Replaced with trio on 2026-05-01.")
    and still contain every non-reversed earlier decision.

  - **Files & Context** — default **APPEND** for newly-introduced files/paths.
    UPDATE only to annotate an already-listed file with new status
    ("worker.py — migrated to asyncio in R3 → benchmarked in R6"); the UPDATE
    content MUST still include every file listed before.

  - **Errors & Corrections** — **APPEND ONLY.** Never UPDATE this section.
    Every error and its fix is a permanent part of the session's history, even
    after the error is resolved. "No errors or corrections noted" is NEVER a
    valid answer if the previous version had entries. If there are genuinely
    no new errors this round, emit KEEP.

  - **Open Issues** — default UPDATE. Explicitly mark resolved items rather
    than silently dropping them. Example:
      - [resolved in R5] Error #2 502 from aiohttp 3.x
      - [new] Need to benchmark scheduler at 1000 concurrent tasks
    Do not drop an unresolved item just because it was not discussed this round.

  # RULE 3 — Self-check BEFORE emitting the tool call.

  Run this checklist silently. If any item fails, fix the corresponding section
  before emitting.

  1. For every section that is NOT KEEP, does my output contain every concrete
     fact (path, error, decision, constraint) from the previous section?
  2. Did I keep Session Title stable (no UPDATE unless the whole project direction
     reversed)?
  3. Did I use APPEND (not UPDATE) for `Key Facts & Decisions`, `Files & Context`,
     and `Errors & Corrections` whenever possible?
  4. Did I mark resolved Open Issues rather than deleting them?
  5. Is every bullet in my output a concrete fact (path / name / date / number),
     not a vague phrase like "general improvements"?
  6. For temporal facts, did I use the EVENT date (not the conversation date)?
     Example: conversation on May 8 mentioning "I went yesterday" → "7 May".

  # RULE 4 — Output constraints.

  - The tool schema requires a decision for ALL 7 sections. Do not skip any.
  - Each section body stays under ~500 tokens. If a section would exceed that
     via APPEND, consolidate older bullets INSIDE an UPDATE (still carrying
     every durable fact) and include the new items.
  - Do not fabricate information not grounded in <new_content> or <current_wm>.
  - You MUST call `update_working_memory` exactly once. No freeform text
     outside the tool call.

llm_config:
  temperature: 0.0
